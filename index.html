<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars.photo | A Silent Chronicle</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            /* 使用衬线体增加文学气息 */
            font-family: "Optima", "Didot", "Georgia", serif; 
            background-color: #000;
            color: #fff;
            overflow: hidden;
        }

        /* 背景层 */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* 依然指向你的图片 mars_bg.png */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.7)), 
                        url('mars_bg.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* 主体内容 */
        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 40px;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 5.5rem);
            font-weight: 200;
            letter-spacing: -1px;
            margin-bottom: 1.5rem;
            text-transform: lowercase;
        }

        h1 span {
            color: #d35400; /* 深火星橙 */
            font-weight: 500;
        }

        .poetry {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 2px;
            color: rgba(255, 255, 255, 0.7);
            max-width: 700px;
            margin-bottom: 4rem;
            line-height: 1.8;
            font-style: italic;
        }

        /* 极简下划线表单 */
        .form-container {
            width: 100%;
            max-width: 450px;
        }

        form {
            display: flex;
            border-bottom: 1px solid rgba(255, 255, 255, 0.3);
            padding-bottom: 8px;
            transition: border-color 0.6s ease;
        }

        form:focus-within {
            border-bottom: 1px solid #d35400;
        }

        input[type="email"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 10px 0;
            color: white;
            font-size: 0.9rem;
            letter-spacing: 1px;
        }

        input[type="email"]::placeholder {
            color: rgba(255, 255, 255, 0.2);
            text-transform: uppercase;
            font-size: 0.7rem;
            letter-spacing: 3px;
        }

        button {
            background: transparent;
            color: #fff;
            border: none;
            padding: 10px 0 10px 20px;
            font-size: 0.75rem;
            text-transform: uppercase;
            letter-spacing: 3px;
            cursor: pointer;
            transition: opacity 0.3s;
            font-weight: 600;
        }

        button:hover {
            color: #d35400;
        }

        footer {
            position: absolute;
            bottom: 40px;
            z-index: 2;
            width: 100%;
            text-align: center;
            font-size: 0.6rem;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 5px;
            text-transform: uppercase;
        }

        @media (max-width: 480px) {
            .poetry { font-size: 0.9rem; letter-spacing: 1px; }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <h1>mars<span>.photo</span></h1>
        
        <p class="poetry">
            To gaze upon the red dust is to witness the silence of time.<br>
            A chronicle of a world once familiar, now echoing in the void.
        </p>

        <div class="form-container">
            <form action="https://formspree.io/f/mlgovlky" method="POST">
                <input type="email" name="email" placeholder="Leave your mark in the dust..." required>
                <button type="submit">Join</button>
            </form>
        </div>
    </div>

    <footer>
        Dust to Dust &bull; &copy; 2026 Mars.photo
    </footer>

</body>
</html>
