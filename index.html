<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mars.photo</title>
    <style>
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body, html {
            height: 100%;
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
            background-color: #000;
            color: #fff;
            overflow: hidden; /* 保持单页不滚动 */
        }

        /* 背景层 */
        .background {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            /* ❗ 这里已经指向你仓库里的 mars_bg.png ❗ */
            background: linear-gradient(rgba(0,0,0,0.3), rgba(0,0,0,0.6)), 
                        url('mars_bg.png');
            background-size: cover;
            background-position: center;
            z-index: 1;
        }

        /* 内容居中 */
        .content {
            position: relative;
            z-index: 2;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            padding: 0 20px;
        }

        h1 {
            font-size: clamp(3rem, 10vw, 6rem);
            font-weight: 900;
            letter-spacing: -2px;
            margin-bottom: 0.5rem;
            text-transform: lowercase;
        }

        h1 span {
            color: #ff5722; /* 火星橙 */
        }

        p {
            font-size: 1.1rem;
            font-weight: 300;
            letter-spacing: 1px;
            opacity: 0.8;
            margin-bottom: 2rem;
        }

        /* 邮箱表单样式 */
        .form-container {
            width: 100%;
            max-width: 450px;
        }

        form {
            display: flex;
            gap: 10px;
            background: rgba(255, 255, 255, 0.1);
            padding: 6px;
            border-radius: 50px;
            border: 1px solid rgba(255, 255, 255, 0.2);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
        }

        input[type="email"] {
            flex: 1;
            background: transparent;
            border: none;
            outline: none;
            padding: 12px 25px;
            color: white;
            font-size: 1rem;
        }

        input[type="email"]::placeholder {
            color: rgba(255, 255, 255, 0.5);
        }

        button {
            background: #fff;
            color: #000;
            border: none;
            padding: 12px 30px;
            border-radius: 40px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.3s ease;
            white-space: nowrap;
        }

        button:hover {
            background: #ff5722;
            color: white;
        }

        footer {
            position: absolute;
            bottom: 30px;
            z-index: 2;
            width: 100%;
            text-align: center;
            font-size: 0.7rem;
            opacity: 0.4;
            letter-spacing: 1px;
        }

        /* 移动端适配 */
        @media (max-width: 480px) {
            form {
                flex-direction: column;
                background: transparent;
                border: none;
                backdrop-filter: none;
            }
            input[type="email"] {
                background: rgba(255, 255, 255, 0.1);
                border-radius: 50px;
                margin-bottom: 10px;
                border: 1px solid rgba(255, 255, 255, 0.2);
            }
        }
    </style>
</head>
<body>

    <div class="background"></div>

    <div class="content">
        <h1>mars<span>.photo</span></h1>
        <p>加入候补名单，抢先获取高清火星影像存档。</p>

        <div class="form-container">
            <form action="https://formspree.io/f/mlgovlky" method="POST">
                <input type="email" name="email" placeholder="输入你的邮箱地址" required>
                <button type="submit">立即加入</button>
            </form>
        </div>
    </div>

    <footer>
        &copy; 2026 MARS.PHOTO | IMAGES STORED ON GITHUB
    </footer>

</body>
</html>
